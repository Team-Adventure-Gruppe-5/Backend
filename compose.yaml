services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "127.0.0.1:8080:8080"
    volumes:
      - "./application-docker.properties:/app/application.properties:ro"
    environment:
      SPRING_CONFIG_LOCATION: file:/app/application.properties
      SPRING_PROFILES_ACTIVE: mysql
      DB_URL: jdbc:mysql://mysql:3306/adventurexp
      DB_DRIVER: com.mysql.cj.jdbc.Driver
      DB_USER: kea
      DB_PASSWORD: kea
    depends_on:
      mysql:
        condition: service_healthy
    restart: on-failure

  # MYSQL SERVICE
  mysql:
    image: mysql:latest
    container_name: my-mysql
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: kea
      MYSQL_DATABASE: adventurexp
      MYSQL_USER: kea
      MYSQL_PASSWORD: kea
    ports:
      - "127.0.0.1:3307:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: [ "CMD", "mysqladmin", "ping", "-h", "localhost", "-ukea", "-pkea" ]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 30s

volumes:
  mysql_data: